<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwojQLnA0ax_97LuyaTZwmJh-9BjnDbyCfPH_IBg1R_fv7paMu_GGi3SZbjCNYaZNwT/exec';
    
    let current = 0, score = 0, timer, sec = 1200, user = {};

    async function check() {
        const m = document.getElementById('mob').value.trim();
        if(!m) { document.getElementById('msg').innerText = "يرجى إدخال رقم الواتساب"; return; }
        
        const btn = document.getElementById('checkBtn');
        btn.innerText = "جاري التحقق...";
        btn.disabled = true;

        try {
            const r = await fetch(`${SCRIPT_URL}?mobile=${m}`);
            const d = await r.json();
            
            if(d.status === 'success') {
                user = { mobile: m, name: d.name, code: d.code };
                // هنا تم ضبط عرض الاسم والكود في مكانهما الصحيح
                document.getElementById('trainee-name').innerText = d.name;
                document.getElementById('trainee-code').innerText = d.code;
                show('welcome');
            } else { 
                document.getElementById('msg').innerText = "الرقم غير مسجل!"; 
            }
        } catch(e) { 
            document.getElementById('msg').innerText = "خطأ في الاتصال. تأكد من إعدادات النشر.";
        } finally {
            btn.innerText = "تحقق من البيانات";
            btn.disabled = false;
        }
    }

    function end() {
        clearInterval(timer);
        show('finish');
        document.getElementById('score').innerText = score;
        
        // إرسال البيانات للتسجيل في الشيت (الدرجة + تفعيل وقت الإرسال تلقائياً)
        const f = new URLSearchParams();
        f.append('mobile', user.mobile);
        f.append('score', score);
        
        fetch(SCRIPT_URL, { 
            method: 'POST', 
            body: f,
            mode: 'no-cors' 
        }).then(() => {
            document.getElementById('status').innerText = "✅ تم حفظ نتيجتك ووقت الإرسال بنجاح.";
            document.getElementById('status').style.color = "#27ae60";
        }).catch(() => {
            document.getElementById('status').innerText = "⚠️ حدث خطأ في الحفظ.";
        });
    }
    
    // باقي الدوال (start, load, show) تظل كما هي بدون تغيير
</script>
